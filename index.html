<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chess Drill Master</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- PWA MANIFEST BEHÍVÁSA -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- ANDROID TÉMASZÍN -->
    <meta name="theme-color" content="#E6EDF5" />

    <!-- APPLE (iOS) PWA BEÁLLÍTÁSOK -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chess Drill" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
  </head>
  <body>
    <div id="root"></div>
    
    <!-- A React (Vite) belépési pontja -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- SERVICE WORKER REGISZTRÁLÁSA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker regisztrálva!', reg))
            .catch(err => console.error('Service Worker hiba:', err));
        });
      }
    </script>
  </body>
</html>
